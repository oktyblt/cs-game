// CS Web Game - Default Server Config
// play-cs tarzı standart rekabetçi/public ayarları

hostname "BrowserCS Server"
sv_name "BrowserCS Server"

// Oyun Kuralları
sv_restartround 1
mp_timelimit 0
mp_roundtime 3
mp_freezetime 4
mp_buytime 0.5
mp_c4timer 35
mp_startmoney 800
mp_forcechasecam 0
mp_forcecamera 0
mp_friendlyfire 0
mp_autoteambalance 1
mp_limitteams 1
mp_flashlight 1
mp_footsteps 1
mp_falldamage 1
mp_hostagepenalty 0
mp_tkpunish 0
decalfrequency 60
browsercs_nextmap "de_dust2"

// Sunucu Fizik & İstemci Ayarları
sv_gravity 800
sv_maxspeed 320
sv_stepsize 18
sv_airaccelerate 10
sv_wateraccelerate 10
sv_clienttrace 1
sv_cheats 0

// Bağlantı ve İletişim Ayarları
sv_alltalk 1
sv_voiceenable 1
sv_maxrate 25000
sv_minrate 2500
sv_maxupdaterate 101
sv_minupdaterate 20
sys_ticrate 100

// Hızlı Dosya İndirme (FastDL)
sv_allowdownload 1
sv_downloadurl "https://browsercs.com/cs-assets/"

// Bot ayarları (Eğer botlar aktif olursa)
bot_difficulty 2
bot_quota 0

// Sunucu açıldığında yazdır
echo ">>> BrowserCS server.cfg yuklendi! <<<"
