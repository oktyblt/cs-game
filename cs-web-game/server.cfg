// CS 1.5 Web Server High Performance CFG
// E-Spor Kalitesi (DonanımHaber Config)

hostname "CS Web Server"

// Ağ ve Rate Ayarları (Müşteri limitlerine göre)
sv_maxupdaterate 200
sv_minupdaterate 30
sv_maxcmdrate 101
sv_mincmdrate 30
sv_maxrate 25000
sv_minrate 17000
sys_ticrate 1000

// Oyun Kuralları
mp_autoteambalance 1
mp_limitteams 2
mp_friendlyfire 0
mp_freezetime 0
mp_roundtime 3
mp_c4timer 35
mp_decals 300
sv_aim 0
pausable 0
sv_cheats 0
sv_gravity 800
sv_maxspeed 320
sv_stepsize 18
sv_airaccelerate 10

allow_spectators 1
mp_timelimit 0
sv_lan 1
